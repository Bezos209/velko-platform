<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velko Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; padding: 40px 24px; }
        
        .header { text-align: center; margin-bottom: 60px; margin-top: 40px; }
        .logo { font-size: 48px; font-weight: 900; color: #FACC15; letter-spacing: -2px; }
        .sub-logo { font-size: 10px; color: #666; letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }

        .title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 32px; color: #eee; }

        .role-card { width: 100%; border-radius: 24px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; cursor: pointer; border: none; transition: transform 0.1s; text-decoration: none; }
        .role-card:active { transform: scale(0.97); }

        .client-card { background-color: #1c1c1e; border: 1px solid #2c2c2e; color: white; }
        .courier-card { background-color: #FACC15; color: black; }

        .icon { font-size: 40px; margin-right: 20px; }
        .text-group { text-align: left; flex-grow: 1; }
        .role-title { font-size: 20px; font-weight: 700; }
        .role-desc { font-size: 14px; opacity: 0.6; margin-top: 4px; }
        .arrow { font-size: 20px; opacity: 0.3; }

        .footer { margin-top: auto; text-align: center; color: #444; font-size: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VELKO</div>
        <div class="sub-logo">Logistic System</div>
    </div>

    <div class="title">Кто вы сегодня?</div>

    <button class="role-card client-card" onclick="selectRole('client')">
        <div class="icon">📦</div>
        <div class="text-group">
            <div class="role-title">Заказчик</div>
            <div class="role-desc">Мне нужна доставка</div>
        </div>
        <div class="arrow">→</div>
    </button>

    <button class="role-card courier-card" onclick="selectRole('courier')">
        <div class="icon">🚴</div>
        <div class="text-group">
            <div class="role-title">Курьер</div>
            <div class="role-desc">Хочу заработать</div>
        </div>
        <div class="arrow">→</div>
    </button>

    <div class="footer">PLATFORM v 1.1.0 • 2026</div>

    <script>
        function selectRole(role) {
            localStorage.setItem('userRole', role);
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(30);
            alert('Вы выбрали роль: ' + (role === 'client' ? 'Заказчик' : 'Курьер') + '. Переходим к регистрации...');
        }
    </script>
</body>
</html>
