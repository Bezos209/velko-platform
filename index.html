<!DOCTYPE html>
<html>
<body style="background:#000;color:#fff;font-family:sans-serif;padding:50px;text-align:center">
    <h1>VELKO</h1>
    <input id="n" placeholder="Имя" style="width:100%;padding:20px;margin:10px 0;border-radius:15px;border:none">
    <input id="p" placeholder="Телефон" style="width:100%;padding:20px;margin:10px 0;border-radius:15px;border:none">
    <button onclick="s()" style="width:100%;padding:20px;background:#FACC15;border-radius:15px;font-weight:bold;border:none">РЕГИСТРАЦИЯ</button>
    <script>
        async function s() {
            const url = 'https://supabase.co';
            const key = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';
            await fetch(url, {
                method: 'POST',
                headers: {'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
                body: JSON.stringify({ name: document.getElementById('n').value, phone: document.getElementById('p').value })
            });
            alert('ГОТОВО! ПРОВЕРЯЙ users_new!');
        }
    </script>
</body>
</html>
