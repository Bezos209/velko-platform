<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velko Platform</title>
    <!-- Подключаем официальную библиотеку, чтобы браузер не ругался -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        .logo { font-size: 48px; font-weight: 900; color: #FACC15; margin-bottom: 40px; }
        input { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #333; background: #111; color: #fff; font-size: 18px; outline: none; }
        button { width: 100%; padding: 20px; background: #FACC15; border: none; border-radius: 20px; font-size: 20px; font-weight: 800; color: #000; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>
    <input type="text" id="n" placeholder="Имя">
    <input type="tel" id="p" placeholder="Телефон">
    <button id="btn" onclick="save()">ЗАРЕГИСТРИРОВАТЬСЯ</button>

    <script>
        // Инициализируем соединение
        const { createClient } = supabase;
        const _supabase = createClient('https://supabase.co', 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8');

        async function save() {
            const name = document.getElementById('n').value;
            const phone = document.getElementById('p').value;
            const btn = document.getElementById('btn');

            if (!name || !phone) return alert('Заполни поля');
            
            btn.innerText = 'ОТПРАВКА...';
            btn.disabled = true;

            // Записываем данные официально
            const { error } = await _supabase
                .from('profiles')
                .insert([{ name: name, phone: phone, role: 'courier' }]);

            if (error) {
                alert('Ошибка: ' + error.message);
                btn.innerText = 'ОШИБКА';
                btn.disabled = false;
            } else {
                alert('ПОБЕДА! Теперь Николай точно в базе через сайт!');
                btn.innerText = 'ГОТОВО ✅';
            }
        }
    </script>
</body>
</html>
