<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELKO Platform</title>
    <style>
        :root { --bg: #000; --card: #121212; --yellow: #FFD22F; --text: #FFF; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-size: 48px; font-weight: 900; color: var(--yellow); margin: 20px 0; letter-spacing: 2px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 24px; padding: 25px; box-sizing: border-box; border: 1px solid #222; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-main { background: var(--yellow); color: #000; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; background: #1A1A1A; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>

    <div id="auth-screen" class="container">
        <h2 style="text-align:center">Вход</h2>
        <select id="userRole">
            <option value="customer">Я Заказчик</option>
            <option value="courier">Я Курьер</option>
        </select>
        <input type="text" id="userName" placeholder="Имя">
        <input type="tel" id="userPhone" placeholder="Телефон">
        <button class="btn btn-main" onclick="sendAuth()">ВОЙТИ</button>
    </div>

    <div id="main-app" class="container hidden">
        <h3 id="hello" style="text-align: center;"></h3>
        <button class="btn btn-main" onclick="localStorage.clear(); location.reload();">ВЫЙТИ</button>
    </div>

    <script>
        const URL = "https://google.com";

        function sendAuth() {
            const role = document.getElementById('userRole').value;
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            
            // Отправляем через невидимый запрос в фоновом режиме
            const finalUrl = `${URL}?action=register&role=${role}&name=${encodeURIComponent(name)}&phone=${phone}`;
            
            const img = new Image();
            img.src = finalUrl; // Это "пробивает" любую защиту
            
            localStorage.setItem('velkoRole', role);
            localStorage.setItem('velkoName', name);
            setTimeout(() => location.reload(), 1000);
        }

        window.onload = function() {
            const role = localStorage.getItem('velkoRole');
            if (role) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('hello').innerText = "Привет, " + role;
            }
        };
    </script>
</body>
</html>
