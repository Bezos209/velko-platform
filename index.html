    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';
        let selectedRole = '';

        function showReg(role) {
            selectedRole = role;
            document.getElementById('rolePage').classList.remove('active');
            document.getElementById('regPage').classList.add('active');
        }

        async function saveUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const btn = document.getElementById('saveBtn');

            if (!name || !phone) { alert('Заполните поля'); return; }
            
            btn.innerText = 'Проверка связи...';
            btn.disabled = true;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ name: name, phone: phone, role: selectedRole })
                });

                if (response.ok) {
                    alert('Ура! Ты в базе.');
                    btn.innerText = 'Готово ✅';
                } else {
                    const err = await response.json();
                    alert('Ошибка базы: ' + JSON.stringify(err));
                    btn.innerText = 'Ошибка';
                    btn.disabled = false;
                }
            } catch (e) {
                alert('Ошибка сети: ' + e.message);
                btn.innerText = 'Нет связи';
                btn.disabled = false;
            }
        }
    </script>
