<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELKO Platform</title>
    <style>
        :root { --bg: #000; --card: #121212; --yellow: #FFD22F; --text: #FFF; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-size: 42px; font-weight: 900; color: var(--yellow); margin: 20px 0 5px; letter-spacing: 2px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; box-sizing: border-box; border: 1px solid #333; margin-top: 20px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-main { background: var(--yellow); color: #000; }
        .btn-dark { background: #242424; color: #fff; border: 1px solid #333; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #1A1A1A; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>
    <div id="login-screen" class="container">
        <h2 style="text-align:center">Вход</h2>
        <input type="tel" id="userPhone" placeholder="89000000000">
        <button class="btn btn-main" id="loginBtn" onclick="checkUser()">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="register-screen" class="container hidden">
        <h2 style="text-align:center">Регистрация</h2>
        <select id="regRole">
            <option value="customer">Я Заказчик</option>
            <option value="courier">Я Курьер</option>
        </select>
        <input type="text" id="regName" placeholder="Имя / Название">
        <input type="text" id="regAddress" placeholder="Ваш адрес">
        <button class="btn btn-main" onclick="register()">СОЗДАТЬ АККАУНТ</button>
    </div>

    <div id="main-app" class="container hidden">
        <h3 id="hello" style="text-align:center"></h3>
        <div id="cust-menu" class="hidden">
            <button class="btn btn-main">📦 СОЗДАТЬ ЗАКАЗ</button>
        </div>
        <div id="cour-menu" class="hidden">
            <button class="btn btn-main">🚀 В РАБОТЕ</button>
        </div>
        <button class="btn btn-dark" style="margin-top:20px" onclick="localStorage.clear(); location.reload()">Выйти</button>
    </div>

    <script>
        const SCRIPT_URL = "https://google.com";

        // Глобальная функция для приема ответа
        window.onAuthResponse = function(data) {
            document.getElementById('loginBtn').innerText = "ПРОДОЛЖИТЬ";
            if (data.status === "found") {
                localStorage.setItem('role', data.role);
                localStorage.setItem('phone', document.getElementById('userPhone').value);
                showApp(data.role);
            } else {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('register-screen').classList.remove('hidden');
            }
        };

        function checkUser() {
            const phone = document.getElementById('userPhone').value.replace(/\D/g, '');
            if (phone.length < 10) return alert("Введите номер");
            document.getElementById('loginBtn').innerText = "Проверка...";
            
            // Метод "невидимки" — iPhone его не блокирует
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=checkUser&phone=${phone}&callback=onAuthResponse`;
            document.body.appendChild(script);
        }

        function register() {
            const role = document.getElementById('regRole').value;
            const data = { action: "register", role: role, phone: document.getElementById('userPhone').value, name: document.getElementById('regName').value, address: document.getElementById('regAddress').value };
            fetch(SCRIPT_URL, {method: "POST", mode: "no-cors", body: JSON.stringify(data)})
            .then(() => { localStorage.setItem('role', role); location.reload(); });
        }

        function showApp(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('hello').innerText = "Привет, " + (role === 'courier' ? "Курьер!" : "Заказчик!");
            document.getElementById(role + '-menu').classList.remove('hidden');
        }

        window.onload = function() {
            if (localStorage.getItem('role')) showApp(localStorage.getItem('role'));
        };
    </script>
</body>
</html>
