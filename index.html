<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELKO</title>
    <style>
        :root { --y: #FFD22F; --b: #121212; }
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .logo { font-size: 40px; font-weight: 900; color: var(--y); margin-bottom: 30px; }
        .card { background: var(--b); padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        input, select { background: #1A1A1A; color: #fff; border: 1px solid #333; }
        button { background: var(--y); color: #000; font-weight: 700; cursor: pointer; }
        .btn-dark { background: #242424; color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>

    <div id="login-screen" class="card">
        <h2>Вход</h2>
        <input type="tel" id="userPhone" placeholder="89000000000">
        <button id="loginBtn" onclick="checkUser()">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="register-screen" class="card hidden">
        <h2>Регистрация</h2>
        <select id="regRole" onchange="document.getElementById('addrField').classList.toggle('hidden', this.value=='courier')">
            <option value="customer">Заказчик</option>
            <option value="courier">Курьер</option>
        </select>
        <input type="text" id="regName" placeholder="Имя / Название">
        <input type="text" id="addrField" placeholder="Адрес">
        <button onclick="register()">СОЗДАТЬ</button>
    </div>

    <div id="app" class="card hidden">
        <h3 id="hello"></h3>
        <div id="cust-menu" class="hidden">
            <select id="orderType" onchange="document.getElementById('preDetails').classList.toggle('hidden', this.value!='Предзаказ')">
                <option value="Срочно">🚀 Срочно</option>
                <option value="Предзаказ">📅 Предзаказ</option>
            </select>
            <div id="preDetails" class="hidden">
                <input type="text" id="oTime" placeholder="Дата и время">
                <input type="number" id="oCount" placeholder="Курьеров" value="1">
            </div>
            <input type="text" id="oAddr" placeholder="Адрес подачи">
            <input type="number" id="oPrice" placeholder="Сумма (наличные)">
            <button onclick="sendOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
        </div>
        <div id="cour-menu" class="hidden">
            <button>🚀 В РАБОТЕ</button>
            <button class="btn-dark">🛠 СЕРВИС</button>
        </div>
        <button class="btn-dark" onclick="localStorage.clear(); location.reload()">Выйти</button>
    </div>

    <script>
        const URL = "https://google.com";

        function checkUser() {
            const phone = document.getElementById('userPhone').value.replace(/\D/g,'');
            if(phone.length < 10) return alert("Номер!");
            document.getElementById('loginBtn').innerText = "⏳...";
            const s = document.createElement('script');
            s.src = `${URL}?action=checkUser&phone=${phone}&callback=onCheck`;
            document.body.appendChild(s);
        }

        window.onCheck = (d) => {
            document.getElementById('loginBtn').innerText = "ПРОДОЛЖИТЬ";
            if(d.status == "found") {
                localStorage.setItem('role', d.role);
                localStorage.setItem('phone', document.getElementById('userPhone').value);
                show(d.role);
            } else {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('register-screen').classList.remove('hidden');
            }
        };

        function register() {
            const role = document.getElementById('regRole').value;
            const data = { action:"register", role:role, phone:document.getElementById('userPhone').value, name:document.getElementById('regName').value, address:document.getElementById('addrField').value };
            fetch(URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)}).then(() => {
                localStorage.setItem('role', role);
                location.reload();
            });
        }

        function sendOrder() {
            const data = {
                action: "createOrder",
                customerName: localStorage.getItem('phone'),
                address: document.getElementById('oAddr').value,
                orderType: document.getElementById('orderType').value,
                details: document.getElementById('oTime').value + " / " + document.getElementById('oCount').value + " чел",
                payment: document.getElementById('oPrice').value
            };
            fetch(URL, {method:"POST", mode:"no-cors", body:JSON.stringify(data)}).then(() => alert("ОК!"));
        }

        function show(r) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('hello').innerText = "Привет, " + r;
            document.getElementById(r == 'courier' ? 'cour-menu' : 'cust-menu').classList.remove('hidden');
        }

        window.onload = () => { if(localStorage.getItem('role')) show(localStorage.getItem('role')); };
    </script>
</body>
</html>
