<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELKO Platform</title>
    <style>
        body { 
            font-family: sans-serif; padding: 20px; background: #000; color: white;
            max-width: 500px; margin: auto; display: flex; flex-direction: column; align-items: center; min-height: 90vh;
        }
        .logo-section { text-align: center; margin-top: 50px; margin-bottom: 60px; }
        .logo-main { font-size: 48px; font-weight: 900; color: #FFD700; letter-spacing: 2px; }
        .logo-sub { font-size: 12px; letter-spacing: 4px; color: #888; text-transform: uppercase; }
        h2 { font-size: 24px; margin-bottom: 30px; }
        .choice-card {
            width: 100%; background: #1C1C1E; border-radius: 24px; padding: 24px; margin-bottom: 16px;
            display: flex; align-items: center; cursor: pointer; border: none; color: white; text-align: left;
        }
        .courier-card { background: #FFD700; color: #000; }
        .icon { font-size: 32px; margin-right: 20px; }
        .text-group { flex-grow: 1; }
        .title { font-size: 18px; font-weight: 700; display: block; }
        .subtitle { font-size: 14px; opacity: 0.7; }
        .arrow { font-size: 20px; opacity: 0.5; }
        .hidden { display: none; }
        .reg-card { background: #1C1C1E; padding: 30px; border-radius: 24px; width: 100%; box-sizing: border-box; }
        input { 
            width: 100%; padding: 16px; margin: 10px 0; background: #2C2C2E; 
            border: 1px solid #3A3A3C; border-radius: 12px; color: white; font-size: 16px; 
        }
        .btn-reg { background: #FFD700; color: #000; font-weight: bold; border: none; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; }
        .btn-reg:disabled { background: #555; }
        .footer { margin-top: auto; font-size: 10px; color: #444; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="logo-main">VELKO</div>
        <div class="logo-sub">LOGISTIC SYSTEM</div>
    </div>

    <div id="step-choice" style="width: 100%;">
        <h2 style="text-align: center;">Кто вы сегодня?</h2>
        <button class="choice-card" onclick="showReg('customer')">
            <span class="icon">📦</span>
            <div class="text-group"><span class="title">Заказчик</span><span class="subtitle">Мне нужна доставка</span></div>
            <span class="arrow">→</span>
        </button>
        <button class="choice-card courier-card" onclick="showReg('courier')">
            <span class="icon">🚴‍♂️</span>
            <div class="text-group"><span class="title">Курьер</span><span class="subtitle">Хочу заработать</span></div>
            <span class="arrow">→</span>
        </button>
    </div>

    <div id="step-reg" class="reg-card hidden">
        <h2 id="reg-title" style="margin-top: 0;">Регистрация</h2>
        <input type="text" id="userName" placeholder="Ваше Имя">
        <input type="tel" id="userPhone" placeholder="Номер телефона">
        <button id="regBtn" class="btn-reg" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        <p onclick="location.reload()" style="color: #888; cursor: pointer; text-align: center; margin-top: 20px;">← Назад</p>
    </div>

    <div id="step-app" class="reg-card hidden" style="text-align: center;">
        <h2 id="welcome-text">Готово!</h2>
        <p style="color: #888;">Вы успешно в базе системы.</p>
        <button class="btn-reg" onclick="location.reload()">ВЫЙТИ</button>
    </div>

    <div class="footer">PLATFORM v 1.1.0 • 2026</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpO6ChrYs9TIVKpTSEnNKphE9HebnA0OFcq3JrLzKteBFVkM1Tk31dw8wn4eW_0mXE/exec";
    let selectedRole = '';

    function showReg(role) {
        selectedRole = role;
        document.getElementById('step-choice').classList.add('hidden');
        document.getElementById('step-reg').classList.remove('hidden');
        document.getElementById('reg-title').innerText = role === 'courier' ? 'Регистрация Курьера' : 'Регистрация Заказчика';
    }

    async function register() {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const regBtn = document.getElementById('regBtn');

        if (!name || !phone) return alert('Заполните данные');

        regBtn.disabled = true;
        regBtn.innerText = "ОБРАБОТКА...";

        const payload = {
            action: 'register',
            name: name,
            phone: phone,
            role: selectedRole
        };

        try {
            // Используем тот самый метод, который работал
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            // Небольшая задержка, чтобы Google успел записать
            setTimeout(() => {
                localStorage.setItem('userPhone', phone);
                localStorage.setItem('userRole', selectedRole);
                document.getElementById('step-reg').classList.add('hidden');
                document.getElementById('step-app').classList.remove('hidden');
                document.getElementById('welcome-text').innerText = `Привет, ${name}!`;
            }, 1000);

        } catch (e) {
            alert('Ошибка сети');
            regBtn.disabled = false;
            regBtn.innerText = "ЗАРЕГИСТРИРОВАТЬСЯ";
        }
    }
</script>
</body>
</html>
