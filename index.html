<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELKO Platform</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #000; color: white; max-width: 500px; margin: auto; display: flex; flex-direction: column; align-items: center; min-height: 90vh; }
        .logo-section { text-align: center; margin-top: 30px; margin-bottom: 40px; }
        .logo-main { font-size: 48px; font-weight: 900; color: #FFD700; letter-spacing: 2px; }
        .logo-sub { font-size: 12px; letter-spacing: 4px; color: #888; text-transform: uppercase; }
        .card { width: 100%; background: #1C1C1E; border-radius: 24px; padding: 24px; margin-bottom: 16px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; box-sizing: border-box; }
        input, select { background: #2C2C2E; color: white; border: 1px solid #3A3A3C; }
        .btn-main { background: #FFD700; color: #000; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #555; }
        .hidden { display: none; }
        .footer { margin-top: auto; font-size: 10px; color: #444; padding-bottom: 20px; }
        h2 { font-size: 22px; text-align: center; margin-bottom: 20px; }
        
        /* Стили для карточек заказов в бирже */
        .order-item { background: #2C2C2E; border-radius: 16px; padding: 15px; margin-top: 15px; border-left: 4px solid #FFD700; text-align: left; }
        .order-item p { margin: 5px 0; font-size: 14px; }
        .order-price { font-size: 18px; font-weight: bold; color: #FFD700; }
    </style>
</head>
<body onload="checkAuth()">

    <div class="logo-section">
        <div class="logo-main">VELKO</div>
        <div class="logo-sub">LOGISTIC SYSTEM</div>
    </div>

    <!-- 1. ВЫБОР РОЛИ -->
    <div id="step-choice" class="hidden" style="width: 100%;">
        <h2>Кто вы сегодня?</h2>
        <button class="card" onclick="showReg('customer')" style="background:#1C1C1E; color:white; display:flex; align-items:center; text-align:left;">
            <span style="font-size:32px; margin-right:20px;">📦</span>
            <div style="flex-grow:1;"><span style="font-weight:700; font-size:18px; display:block;">Заказчик</span><span style="font-size:14px; opacity:0.7;">Мне нужна доставка</span></div>
            <span>→</span>
        </button>
        <button class="card" onclick="showReg('courier')" style="background:#FFD700; color:#000; display:flex; align-items:center; text-align:left;">
            <span style="font-size:32px; margin-right:20px;">🚴‍♂️</span>
            <div style="flex-grow:1;"><span style="font-weight:700; font-size:18px; display:block;">Курьер</span><span style="font-size:14px; opacity:0.7;">Хочу заработать</span></div>
            <span>→</span>
        </button>
    </div>

    <!-- 2. РЕГИСТРАЦИЯ -->
    <div id="step-reg" class="card hidden">
        <h2 id="reg-title">Регистрация</h2>
        <input type="text" id="userName" placeholder="Ваше Имя">
        <input type="tel" id="userPhone" placeholder="Номер телефона">
        <button id="regBtn" class="btn-main" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <!-- 3. ФОРМА ЗАКАЗА (ЗАКАЗЧИК) -->
    <div id="step-order" class="card hidden">
        <h2>📦 Создать заказ</h2>
        <input type="text" id="orderAddress" placeholder="Адрес доставки">
        <input type="number" id="orderPrice" placeholder="Сумма (руб)">
        <button id="orderBtn" class="btn-main" onclick="sendOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
        <button onclick="logout()" style="background:none; color:#555; font-size:12px;">Выйти</button>
    </div>

    <!-- 4. БИРЖА (КУРЬЕР) -->
    <div id="step-courier" class="card hidden">
        <h2>🚴‍♂️ Биржа заказов</h2>
        <button class="btn-main" onclick="loadOrders()">ОБНОВИТЬ СПИСОК</button>
        <div id="ordersList">
            <!-- Сюда будут падать заказы -->
        </div>
        <button onclick="logout()" style="background:none; color:#555; font-size:12px; margin-top:30px;">Выйти из аккаунта</button>
    </div>

    <div class="footer">PLATFORM v 1.1.0 • 2026</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpO6ChrYs9TIVKpTSEnNKphE9HebnA0OFcq3JrLzKteBFVkM1Tk31dw8wn4eW_0mXE/exec";
    
    function checkAuth() {
        const phone = localStorage.getItem('userPhone');
        const role = localStorage.getItem('userRole');
        if (phone && role) {
            document.getElementById(role === 'customer' ? 'step-order' : 'step-courier').classList.remove('hidden');
            if(role === 'courier') loadOrders(); // Если курьер, сразу грузим заказы
        } else {
            document.getElementById('step-choice').classList.remove('hidden');
        }
    }

    function logout() { localStorage.clear(); location.reload(); }

    async function register() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const role = selectedRole;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'register', name, phone, role }) });
        localStorage.setItem('userPhone', phone);
        localStorage.setItem('userRole', role);
        setTimeout(() => location.reload(), 1000);
    }

    async function sendOrder() {
        const payload = {
            action: 'createOrder',
            customerPhone: localStorage.getItem('userPhone'),
            address: document.getElementById('orderAddress').value,
            orderType: 'Онлайн',
            details: 'Срочно',
            payment: document.getElementById('orderPrice').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert('Заказ отправлен!');
        location.reload();
    }

    // --- НОВАЯ ФУНКЦИЯ: ЗАГРУЗКА ЗАКАЗОВ ---
    async function loadOrders() {
        const listDiv = document.getElementById('ordersList');
        listDiv.innerHTML = '<p style="text-align:center;">Загрузка...</p>';

        // Используем GET запрос для чтения (самый простой способ)
        try {
            const response = await fetch(SCRIPT_URL + "?action=getOrders");
            const data = await response.json();
            
            listDiv.innerHTML = ''; // Очищаем текст загрузки

            if (data.orders && data.orders.length > 0) {
                data.orders.forEach(ord => {
                    const item = document.createElement('div');
                    item.className = 'order-item';
                    item.innerHTML = `
                        <p><strong>Адрес:</strong> ${ord.address}</p>
                        <p><strong>Детали:</strong> ${ord.details}</p>
                        <p class="order-price">${ord.payment} ₽</p>
                        <button class="btn-main" style="padding:10px; font-size:14px;" onclick="alert('Скоро сделаем взятие заказа!')">ВЗЯТЬ ЗАКАЗ</button>
                    `;
                    listDiv.appendChild(item);
                });
            } else {
                listDiv.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">Новых заказов пока нет</p>';
            }
        } catch (e) {
            listDiv.innerHTML = '<p style="text-align:center; color:red;">Ошибка загрузки</p>';
        }
    }

    let selectedRole = '';
    function showReg(role) {
        selectedRole = role;
        document.getElementById('step-choice').classList.add('hidden');
        document.getElementById('step-reg').classList.remove('hidden');
    }
</script>
</body>
</html>
