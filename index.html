<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velko Platform</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        .logo { font-size: 48px; font-weight: 900; color: #FACC15; margin-bottom: 40px; }
        input { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #333; background: #111; color: #fff; font-size: 18px; outline: none; }
        button { width: 100%; padding: 20px; background: #FACC15; border: none; border-radius: 20px; font-size: 20px; font-weight: 800; color: #000; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>
    <input type="text" id="name" placeholder="Имя">
    <input type="tel" id="phone" placeholder="Телефон">
    <button onclick="save()">ЗАРЕГИСТРИРОВАТЬСЯ</button>

    <script>
        function save() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            if (!name || !phone) return alert('Заполни поля');

            const url = 'https://supabase.co';
            const key = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';

            fetch(url, {
                method: 'POST',
                headers: {
                    'apikey': key,
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ name: name, phone: phone, role: 'courier' })
            })
            .then(() => {
                alert('ГОТОВО! Проверяй таблицу на Маке!');
            })
            .catch((err) => {
                alert('Ошибка: ' + err.message);
            });
        }
    </script>
</body>
</html>
