<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velko Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; padding: 40px 24px; }
        .page { display: none; flex-direction: column; height: 100%; width: 100%; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 48px; font-weight: 900; color: #FACC15; letter-spacing: -2px; }
        .sub-logo { font-size: 10px; color: #666; letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }
        .title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 32px; }
        .role-card { width: 100%; border-radius: 24px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; cursor: pointer; border: none; transition: 0.1s; }
        .role-card:active { transform: scale(0.97); }
        .client-card { background-color: #1c1c1e; border: 1px solid #2c2c2e; color: white; }
        .courier-card { background-color: #FACC15; color: black; }
        .icon { font-size: 40px; margin-right: 20px; }
        .text-group { text-align: left; flex-grow: 1; }
        .role-title { font-size: 20px; font-weight: 700; }
        .role-desc { font-size: 14px; opacity: 0.6; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 12px; text-transform: uppercase; font-weight: 700; }
        input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 18px; border-radius: 16px; color: #fff; font-size: 16px; outline: none; }
        .main-btn { width: 100%; background: #FACC15; color: #000; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .footer { margin-top: auto; text-align: center; color: #444; font-size: 10px; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="rolePage" class="page active">
        <div class="header"><div class="logo">VELKO</div><div class="sub-logo">Logistic System</div></div>
        <div class="title">Кто вы сегодня?</div>
        <button class="role-card client-card" onclick="showReg('client')"><div class="icon">📦</div><div class="text-group"><div class="role-title">Заказчик</div><div class="role-desc">Мне нужна доставка</div></div></button>
        <button class="role-card courier-card" onclick="showReg('courier')"><div class="icon">🚴</div><div class="text-group"><div class="role-title">Курьер</div><div class="role-desc">Хочу заработать</div></div></button>
    </div>

    <div id="regPage" class="page">
        <div class="title" id="regTitle">Регистрация</div>
        <div class="input-group"><label>Ваше имя</label><input type="text" id="userName" placeholder="Иван Иванов"></div>
        <div class="input-group"><label>Номер телефона</label><input type="tel" id="userPhone" placeholder="+7 (999) 000-00-00"></div>
        <button class="main-btn" id="saveBtn" onclick="saveUser()">Зарегистрироваться</button>
    </div>

    <div class="footer">PLATFORM v 1.3.0</div>

    <script>
        const SUPABASE_URL = 'https://supabase.co';
        const SUPABASE_KEY = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';
        let selectedRole = '';

        function showReg(role) {
            selectedRole = role;
            document.getElementById('rolePage').classList.remove('active');
            document.getElementById('regPage').classList.add('active');
        }

        async function saveUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const btn = document.getElementById('saveBtn');

            if (!name || !phone) { alert('Заполните поля'); return; }
            
            btn.innerText = 'Сохранение...';
            btn.disabled = true;

            const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, phone, role: selectedRole })
            });

            if (response.ok) {
                alert('Успех! Данные в базе.');
                btn.innerText = 'Готово ✅';
            } else {
                alert('Ошибка базы. Проверь таблицу.');
                btn.innerText = 'Попробовать снова';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
