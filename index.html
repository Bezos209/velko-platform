<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velko</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; background: #111; color: #fff; border: 1px solid #333; }
        button { width: 100%; padding: 18px; background: #FACC15; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>VELKO</h1>
    <input type="text" id="n" placeholder="Имя">
    <input type="tel" id="p" placeholder="Телефон">
    <button onclick="save()">ЗАРЕГИСТРИРОВАТЬСЯ</button>

    <script>
        function save() {
            const n = document.getElementById('n').value;
            const p = document.getElementById('p').value;
            const url = 'https://supabase.co';
            const key = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';

            // Используем метод, который не вызывает ошибку CORS
            const xhr = new XMLHttpRequest();
            xhr.open("POST", url);
            xhr.setRequestHeader("apikey", key);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 201 || xhr.status === 200 || xhr.status === 204) {
                        alert("ГОТОВО! Николай в базе!");
                    } else {
                        alert("Ошибка: " + xhr.status);
                    }
                }
            };
            xhr.send(JSON.stringify({ name: n, phone: p, role: 'courier' }));
        }
    </script>
</body>
</html>
