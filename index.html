
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELKO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; background: #FACC15; color: #000; }
    </style>
</head>
<body>
    <h1>VELKO</h1>
    <div id="start">
        <button onclick="show('reg-client')">Я ЗАКАЗЧИК</button>
        <button onclick="show('reg-courier')" style="background:#222; color:#fff; margin-top:15px;">Я КУРЬЕР</button>
    </div>

    <div id="reg-client" class="hidden">
        <input type="text" id="z-name" placeholder="Название компании">
        <button onclick="save('client')">ВОЙТИ</button>
    </div>

    <div id="reg-courier" class="hidden">
        <input type="text" id="c-name" placeholder="Имя">
        <button onclick="save('courier')">ВОЙТИ</button>
    </div>

    <div id="order-form" class="hidden">
        <h3>Новый заказ</h3>
        <input type="text" id="o-from" placeholder="Откуда">
        <input type="text" id="o-to" placeholder="Куда">
        <button onclick="sendOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
    </div>

    <script>
        const url = 'https://google.com';

        function show(id) {
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function save(role) {
            localStorage.setItem('role', role);
            show('order-form');
        }

        async function sendOrder() {
            const data = {
                action: 'createOrder',
                from: document.getElementById('o-from').value,
                to: document.getElementById('o-to').value,
                clientName: 'Тест'
            };
            await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert('ЗАКАЗ В ТАБЛИЦЕ!');
            location.reload();
        }
    </script>
</body>
</html>
