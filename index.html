<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELKO Platform</title>
    <style>
        :root { --bg: #000; --card: #121212; --yellow: #FFD22F; --text: #FFF; --gray: #A0A0A0; --dark-btn: #242424; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-size: 42px; font-weight: 900; color: var(--yellow); margin: 20px 0 5px; letter-spacing: 2px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; box-sizing: border-box; border: 1px solid #333; margin-top: 20px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .btn-main { background: var(--yellow); color: #000; }
        .btn-dark { background: var(--dark-btn); color: var(--text); border: 1px solid #333; }
        .btn-link { background: transparent; color: var(--gray); font-size: 14px; margin-top: 15px; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #1A1A1A; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
        .loader { color: var(--yellow); font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="logo">VELKO</div>

    <!-- ЭКРАН 1: ВХОД ПО ТЕЛЕФОНУ -->
    <div id="login-screen" class="container">
        <h2 style="text-align:center">Вход в систему</h2>
        <input type="tel" id="userPhone" placeholder="+7 (999) 000-00-00">
        <div id="login-loader" class="hidden">Проверка номера...</div>
        <button class="btn btn-main" onclick="checkUser()">ПРОДОЛЖИТЬ</button>
    </div>

    <!-- ЭКРАН 2: РЕГИСТРАЦИЯ -->
    <div id="register-screen" class="container hidden">
        <h2 style="text-align:center">Регистрация</h2>
        <select id="regRole">
            <option value="customer">Я Заказчик (Кафе/Магазин)</option>
            <option value="courier">Я Курьер</option>
        </select>
        <input type="text" id="regName" placeholder="Имя / Название">
        <input type="text" id="regLastName" placeholder="Фамилия (для курьера)">
        <input type="text" id="regAddress" placeholder="Адрес (для заказчика)">
        <button class="btn btn-main" onclick="handleRegister()">СОЗДАТЬ АККАУНТ</button>
    </div>

    <!-- КАБИНЕТЫ БУДУТ ТУТ (Оставляем твой дизайн) -->
    <div id="main-app" class="container hidden">
        <h3 id="hello-user" style="text-align:center">Привет!</h3>
        <div id="courier-menu" class="hidden">
            <button class="btn btn-main">🚀 ВЫЙТИ НА РАБОТУ</button>
            <button class="btn btn-dark">🛠 СЕРВИС / ЗАПЧАСТИ</button>
            <button class="btn btn-dark">🚲 АРЕНДА ЭЛЕКТРОВЕЛО</button>
        </div>
        <div id="customer-menu" class="hidden">
            <button class="btn btn-main">📦 СОЗДАТЬ ЗАКАЗ</button>
        </div>
        <button class="btn btn-link" onclick="logout()">Выйти из профиля</button>
    </div>

    <script>
        const SCRIPT_URL = "https://google.com";

        window.onload = function() {
            const savedUser = localStorage.getItem('userPhone');
            if (savedUser) showApp(localStorage.getItem('userRole'), savedUser);
        };

        function checkUser() {
            const phone = document.getElementById('userPhone').value.trim();
            if (!phone) return alert("Введите номер");
            
            document.getElementById('login-loader').classList.remove('hidden');

            // Мы шлем запрос в таблицу, чтобы найти пользователя
            fetch(`${SCRIPT_URL}?action=checkUser&phone=${phone}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('login-loader').classList.add('hidden');
                if (data.status === "found") {
                    saveAndShow(data.role, phone);
                } else {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('register-screen').classList.remove('hidden');
                }
            });
        }

        function handleRegister() {
            const role = document.getElementById('regRole').value;
            const phone = document.getElementById('userPhone').value;
            const data = {
                action: "register",
                role: role,
                phone: phone,
                name: document.getElementById('regName').value,
                lastName: document.getElementById('regLastName').value,
                address: document.getElementById('regAddress').value
            };

            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => saveAndShow(role, phone));
        }

        function saveAndShow(role, phone) {
            localStorage.setItem('userRole', role);
            localStorage.setItem('userPhone', phone);
            location.reload();
        }

        function showApp(role, phone) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('hello-user').innerText = `Привет, ${role === 'courier' ? 'Курьер' : 'Заказчик'}!`;
            document.getElementById(role + '-menu').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
