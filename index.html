<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELKO Platform</title>
    <style>
        :root { --bg: #000; --card: #121212; --yellow: #FFD22F; --text: #FFF; --gray: #A0A0A0; --dark-btn: #242424; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { font-size: 42px; font-weight: 900; color: var(--yellow); margin: 20px 0 5px; letter-spacing: 2px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; box-sizing: border-box; border: 1px solid #333; margin-top: 20px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .btn-main { background: var(--yellow); color: #000; }
        .btn-dark { background: var(--dark-btn); color: var(--text); border: 1px solid #333; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #1A1A1A; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="logo">VELKO</div>

    <div id="login-screen" class="container">
        <h2 style="text-align:center">Вход в систему</h2>
        <input type="tel" id="userPhone" placeholder="89000000000">
        <button class="btn btn-main" id="loginBtn" onclick="checkUser()">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="register-screen" class="container hidden">
        <h2 style="text-align:center">Регистрация</h2>
        <select id="regRole" onchange="document.getElementById('regAddr').classList.toggle('hidden', this.value=='courier')">
            <option value="customer">Я Заказчик</option>
            <option value="courier">Я Курьер</option>
        </select>
        <input type="text" id="regName" placeholder="Имя / Название">
        <input type="text" id="regAddr" placeholder="Ваш адрес">
        <button class="btn btn-main" onclick="handleRegister()">СОЗДАТЬ АККАУНТ</button>
    </div>

    <div id="main-app" class="container hidden">
        <h3 id="hello-user" style="text-align:center">Привет!</h3>
        <div id="courier-menu" class="hidden">
            <button class="btn btn-main">🚀 ВЫЙТИ НА РАБОТУ</button>
            <button class="btn btn-dark">🛠 СЕРВИС</button>
        </div>
        <div id="customer-menu" class="hidden">
            <h4 style="text-align:center">НОВЫЙ ЗАКАЗ</h4>
            <select id="orderType" onchange="document.getElementById('pre-fields').classList.toggle('hidden', this.value!='Предзаказ')">
                <option value="Срочно">🚀 Срочно</option>
                <option value="Предзаказ">📅 Предзаказ</option>
            </select>
            <div id="pre-fields" class="hidden">
                <input type="text" id="oTime" placeholder="Дата и время">
                <input type="number" id="oCount" placeholder="Курьеров" value="1">
            </div>
            <input type="text" id="oAddr" placeholder="Адрес подачи">
            <input type="number" id="oPrice" placeholder="Сумма (наличными)">
            <button class="btn btn-main" onclick="sendOrder()">ОТПРАВИТЬ</button>
        </div>
        <button class="btn btn-dark" style="margin-top:20px; background:none; border:none; color:var(--gray)" onclick="localStorage.clear(); location.reload()">Выйти</button>
    </div>

    <script>
        const SCRIPT_URL = "https://google.com";

        async function checkUser() {
            const phone = document.getElementById('userPhone').value.replace(/\D/g, '');
            if (phone.length < 10) return alert("Введите номер");
            document.getElementById('loginBtn').innerText = "Проверка...";

            try {
                // Прямой запрос к тому самому "рабочему" скрипту
                const response = await fetch(`${SCRIPT_URL}?action=checkUser&phone=${phone}`);
                const data = await response.json();
                
                if (data.status === "found") {
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userPhone', phone);
                    showApp(data.role);
                } else {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('register-screen').classList.remove('hidden');
                }
            } catch (e) {
                alert("Ошибка связи. Убедись, что в Apps Script выбрано 'Доступ: Все'");
                document.getElementById('loginBtn').innerText = "ПРОДОЛЖИТЬ";
            }
        }

        async function handleRegister() {
            const role = document.getElementById('regRole').value;
            const phone = document.getElementById('userPhone').value.replace(/\D/g, '');
            const data = { action: "register", role: role, phone: phone, name: document.getElementById('regName').value, address: document.getElementById('regAddr').value };
            
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            localStorage.setItem('userRole', role);
            localStorage.setItem('userPhone', phone);
            location.reload();
        }

        async function sendOrder() {
            const data = {
                action: "createOrder",
                customerName: localStorage.getItem('userPhone'),
                address: document.getElementById('oAddr').value,
                orderType: document.getElementById('orderType').value,
                details: document.getElementById('oTime').value + " / " + document.getElementById('oCount').value + " чел",
                payment: document.getElementById('oPrice').value
            };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("Заказ отправлен!");
        }

        function showApp(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('hello-user').innerText = "Привет, " + (role === 'courier' ? "Курьер!" : "Заказчик!");
            document.getElementById(role + '-menu').classList.remove('hidden');
        }

        window.onload = function() {
            const role = localStorage.getItem('userRole');
            if (role) showApp(role);
        };
    </script>
</body>
</html>
