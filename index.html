<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velko Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; padding: 40px 24px; }
        .page { display: none; flex-direction: column; height: 100%; width: 100%; }
        .page.active { display: flex; }
        .header { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 48px; font-weight: 900; color: #FACC15; letter-spacing: -2px; }
        .title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 32px; }
        .role-card { width: 100%; border-radius: 24px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; border: none; outline: none; }
        .client-card { background-color: #1c1c1e; color: white; border: 1px solid #2c2c2e; }
        .courier-card { background-color: #FACC15; color: black; }
        .icon { font-size: 40px; margin-right: 20px; }
        .role-title { font-size: 20px; font-weight: 700; }
        input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; padding: 18px; border-radius: 16px; color: #fff; font-size: 16px; margin-bottom: 20px; outline: none; }
        .main-btn { width: 100%; background: #FACC15; color: #000; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="rolePage" class="page active">
        <div class="header"><div class="logo">VELKO</div></div>
        <div class="title">Кто вы сегодня?</div>
        <button class="role-card client-card" onclick="showReg('client')">
            <div class="icon">📦</div><div class="role-title">Заказчик</div>
        </button>
        <button class="role-card courier-card" onclick="showReg('courier')">
            <div class="icon">🚴</div><div class="role-title">Курьер</div>
        </button>
    </div>

    <div id="regPage" class="page">
        <div class="title">Регистрация</div>
        <input type="text" id="userName" placeholder="Ваше имя">
        <input type="tel" id="userPhone" placeholder="Номер телефона">
        <button class="main-btn" id="saveBtn" onclick="saveUser()">Зарегистрироваться</button>
    </div>

    <script>
        const SB_URL = 'https://supabase.co';
        const SB_KEY = 'sb_publishable_pZgpDpCc_EbkZ-26UW6HMg_7quVbfl8';
        let selRole = '';

        function showReg(r) {
            selRole = r;
            document.getElementById('rolePage').classList.remove('active');
            document.getElementById('regPage').classList.add('active');
        }

        async function saveUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const btn = document.getElementById('saveBtn');

            if (!name || !phone) { alert('Заполни поля'); return; }
            btn.innerText = 'Запись...';
            btn.disabled = true;

            try {
                const res = await fetch(SB_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': 'Bearer ' + SB_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ name: name, phone: phone, role: selRole })
                });

                if (res.ok) {
                    alert('ГОТОВО! Николай в базе!');
                    btn.innerText = 'Успех ✅';
                } else {
                    const errorData = await res.json();
                    alert('Ошибка базы: ' + errorData.message);
                    btn.innerText = 'Ошибка';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Ошибка сети: ' + err.message);
                btn.innerText = 'Нет связи';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
